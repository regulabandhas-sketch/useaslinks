<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USEAS | Professional File Host</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="upload-card">
            <h1>USEAS<span>CLOUD</span></h1>
            <p class="subtitle">Secure, permanent file storage</p>

            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="icon">☁️</div>
                <p>Click or drag file to upload</p>
                <input type="file" id="fileInput" hidden>
            </div>

            <button class="main-btn" onclick="uploadFile()">Generate Link</button>

            <div id="statusArea" class="hidden">
                <div class="spinner"></div>
                <p>Uploading to permanent storage...</p>
            </div>

            <div id="resultArea" class="hidden">
                <p class="success-label">Success! Your link is ready:</p>
                <div class="link-group">
                    <input type="text" id="urlDisplay" readonly>
                    <button onclick="copyLink()">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
