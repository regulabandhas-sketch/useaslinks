<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USEAS Cloud | Secure Upload</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="upload-card">
            <div class="header">
                <h1>Secure Cloud Storage</h1>
                <p>Upload files, images, or apps permanently</p>
            </div>

            <div class="drop-zone" id="dropZone">
                <span class="drop-zone__prompt">Drop file here or click to upload</span>
                <input type="file" name="myFile" id="fileInput" class="drop-zone__input">
            </div>

            <button class="upload-btn" onclick="uploadFile()">Generate Permanent Link</button>

            <div id="statusArea">
                <div id="loader" class="hidden">Uploading...</div>
                <div id="result" class="result-box hidden">
                    <p>File Link:</p>
                    <input type="text" id="urlDisplay" readonly>
                    <button onclick="copyLink()" class="copy-btn">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
